# Default keybinds:
# + and _ -> cycle through layouts: normal, half, full

os:
  editPreset: 'nvim-remote'

gui:
  showIcons: true # enable nerd fonts
  theme:
    activeBorderColor:
      - yellow
      - bold
    selectedLineBgColor:
      # NOTE: use hex instead of 'black' for nvim terminal coloring
      - "#444444"
  sidePanelWidth: 0.25 #fraction of left side, default is 0.33
git:
  branchLogCmd: "git log --color=always --graph --abbrev-commit --decorate --format=format:'%C(bold blue)%h%C(reset) - %C(bold green)(%ar)%C(reset) %C(white)%s%C(reset) %C(dim white)- %an%C(reset)%C(auto)%d%C(reset)' --date-order"
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --side-by-side # side by side takes more horizontal space
      # pager: delta --dark --paging=never
      # pager: delta --dark --paging=never --diff-so-fancy # diff-so-fancy mode breaks syntax highlighting
  disableForcePushing: true
keybinding:
  universal:
    toggleRangeSelect: "V"
  commits:
    cherryPickCopy: "y"
    copyCommitAttributeToClipboard: "c"
    pasteCommits: "v"
confirmOnQuit: true
customCommands:
  - key: "W" # think force [W]rite
    command: git commit --no-verify
    context: "global"
    output: terminal
  - key: "<c-a>"
    context: "localBranches"
    description: "View PR [A]ctions with gh enhance"
    command: 'gh enhance "$(gh pr view {{.SelectedLocalBranch.Name}} --json number -q .number)"'
    output: terminal
    loadingText: "Looking up PR…"
  # - key: "<c-g>"
  #   context: "global"
  #   description: "Open [G]itHub dashboard (gh-dash)"
  #   command: gh dash
  #   output: terminal
  - key: "<c-g>"
    context: "localBranches"
    description: "View PR details"
    command: 'gh pr view {{.SelectedLocalBranch.Name}}'
    output: popup
