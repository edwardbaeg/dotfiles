session_name: dotfiles
windows:
  - window_name: dotfiles root
    start_directory: ~/dev/dotfiles/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: neovim
    start_directory: ~/dev/dotfiles/nvim/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: hammerspoon
    start_directory: ~/dev/dotfiles/hammerspoon/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: tmux
    start_directory: ~/dev/dotfiles/tmux/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: zsh
    start_directory: ~/dev/dotfiles/zsh/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: obsidian
    start_directory: "~/Sync/Obsidian Vault/"
    panes:
      - shell_command: []
