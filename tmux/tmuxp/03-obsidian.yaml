session_name: obsidian
windows:
  - window_name: main
    start_directory: "~/Sync/Obsidian Vault/"
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - shell_command:
          - nvim Home.md

  - window_name: development
    start_directory: "~/Sync/Obsidian Vault/"
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - shell_command:
          - nvim ~/Sync/Obsidian\ Vault/wiki/coding-and-development.md

  - window_name: work
    start_directory: "~/Sync/Obsidian Vault/"
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - shell_command:
          - nvim ~/Sync/Obsidian\ Vault/work/work-home.md
