session_name: dispatch
windows:
  - window_name: main
    start_directory: ~/dev/oneadvisory/frontend/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: worktree
    start_directory: ~/dev/oneadvisory/worktrees/worktree1/
    layout: main-vertical
    options:
      main-pane-width: 66%
    panes:
      - focus: true
      - shell_command: []

  - window_name: servers
    start_directory: ~/dev/oneadvisory/frontend/
    layout: even-vertical
    panes:
      - shell_command:
          - npm run dev
      - shell_command:
          - npm run build:packages:watch
      - shell_command: []

  - window_name: gh-dash
    start_directory: ~/dev/oneadvisory/frontend/
    layout: main-horizontal
    options:
      main-pane-height: 66%
    panes:
      - shell_command:
          - gh dash
      - shell_command: []
