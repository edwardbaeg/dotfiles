# See README.md for tmux notes and keybindings reference

# PALETTE
#--------------------
# NOTE: must use double quotes to expand variables
COLOR_RED="colour161"
COLOR_ORANGE="colour208"
COLOR_PALE_BLUE="colour189"
COLOR_TEAL="colour6"
COLOR_AQUA="colour14"
COLOR_LIME="colour10"

COLOR_GREY="colour247"
COLOR_DARK_GREY="colour241"
COLOR_EXTRA_DARK_GREY="colour237"
COLOR_BG="colour234"

# CORE
#--------------------
set -g default-terminal 'tmux-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

set -g base-index 1 # default is 0
setw -g pane-base-index 1 # default is 0
set-option -g renumber-windows on # renumber windows when windows closed

set -g mouse on

# increase scrollback limit (default: 2000)
set -g history-limit 100000

# tmux messages display time
set -g display-time 1001

# Recommended by nvim
set-option -sg escape-time 10
set-option -g focus-events on

set -g monitor-bell on
set -g monitor-activity off # disabled because everything seems to be activity

# Allow image preview for yazi and image.nvim
# https://yazi-rs.github.io/docs/image-preview/#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# PREFIX
#--------------------
unbind c-b
set-option -g prefix C-a
bind-key C-a send-prefix

# PANES
#--------------------
set -g window-active-style "bg=default fg=default"

set -g pane-border-style "#{?window_bell_flag,bg=default fg=$COLOR_ORANGE,bg=default fg=$COLOR_EXTRA_DARK_GREY}"

# indicate the active pane
set -g pane-border-indicators colour # both = colour and arrow

# add border with pane title; see pane-border-format and FORMATS
set -g pane-border-status bottom
set -g pane-border-format "  #{pane_index} #[fg=$COLOR_DARK_GREY]/#{window_panes} #{pane_current_command}  "

set -g pane-border-lines single

set -g pane-active-border-style "#{?window_bell_flag,bg=default fg=$COLOR_ORANGE,bg=default fg=default}"

# POPUP
#--------------------
set -g popup-border-lines rounded

# MODES
#--------------------
setw -g mode-keys vi
bind-key v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# STATUS BAR
#--------------------
set -g status-interval 15
set -g status-style fg=white,bg=default
set -g status-position bottom
set -g visual-activity off

set -g status-left-length 40
set -g status-left-style default
set -g status-left "#[fg=$COLOR_RED,bold,italics]#{s/root//:client_key_table} #[fg=$COLOR_GREY,noitalics][ #S ]#{?pane_synchronized,#[fg=$COLOR_ORANGE,bold] sync,}"

# CODES: #I number; #W window name; #F flag
setw -g status-justify left

setw -g window-status-style fg=colour245,bg=default
setw -g window-status-format ' #W#[fg=default]#F'

setw -g window-status-current-style bg=default,fg=white,bold
setw -g window-status-current-format ' #W#[fg=colour6]#F'

# test bell with: sleep 1 && printf '\a'
setw -g window-status-bell-style "bg=default,fg=$COLOR_ORANGE,bold"

set -g status-right-length 100
set -g status-right-style fg=$COLOR_GREY,default
set -g status-right '#[bg=default]#{=21:pane_title} #[fg=default,noitalics,nobold]  %I:%M %p '

# MESSAGES
#--------------------
set -g message-style italics,bold,fg=colour197,bg=default

# KEYBINDINGS
#--------------------

# --- Reload
bind r source-file ~/.tmux.conf \; display-message "  Config reloaded"

# --- Pane splits
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind -n M-'\' split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

unbind c-d

# --- Pane navigation
bind j select-pane -D
bind k select-pane -U
bind h select-pane -L
bind l select-pane -R

# --- Pane resize
bind -r M-j resize-pane -D 1
bind -r M-k resize-pane -U 1
bind -r M-l resize-pane -R 1
bind -r M-h resize-pane -L 1

# --- Pane layout & zoom
bind o select-layout -o
bind-key -n 'm-z' resize-pane -Z

# --- Window selection
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9

# --- Tree mode
# -s session; -w window; -Z in zoom mode; last window flag is per session
TREE_FORMAT="#{?window_bell_flag,#[fg=$COLOR_ORANGE],}\
  #{?window_last_flag,#[fg=$COLOR_PALE_BLUE],}\
  #{window_name}#{window_flags}\
  #[default]"

bind-key -n 'm-s' choose-tree -s -Z -F "$TREE_FORMAT"  # sessions collapsed
bind-key -n 'm-d' choose-tree -w -Z -F "$TREE_FORMAT"  # windows collapsed
bind-key -n 'm-f' choose-tree -Z -F "$TREE_FORMAT"     # panes collapsed

# --- Sync panes
bind S setw synchronize-panes \; display "sync: #{?pane_synchronized,ON,OFF}"

# --- Nested-session toggle
# Disable session keybindings and prefix key; for use with nested ssh tmux sessions
bind -T root c-Space  \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=$COLOR_GREY" \;\
  set status-left "#[fg=$COLOR_RED,bold,italics]#{s/root//:client_key_table} #[fg=$COLOR_DARK_GREY,noitalics][ #S ]" \;\
  set window-status-current-format "#[default] #[fg=colour248]#W#[fg=$COLOR_TEAL]#F" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off c-Space \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u status-left \;\
  set -u window-status-current-style \;\
  set -u window-status-current-format \;\
  refresh-client -S

# --- Floating terminal
bind-key -n 'm-/' run-shell -b "${HOME}/bin/tmux-toggle-term.sh float"
bind-key 'f' run-shell -b "${HOME}/bin/tmux-toggle-term.sh float"

# --- vim-tmux-navigator
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
unbind -n C-\\

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# restore clear screen after pressing prefix
bind C-l send-keys 'C-l'

# COMMAND ALIASES
#--------------------
# https://github.com/tmux/tmux/wiki/Advanced-Use#command-aliases
set -g command-alias[100] 'rs=rename-session' # start at index 100 as defaults are 0 indexed
set -g command-alias[101] 'rw=rename-window'
set -g command-alias[102] 'ks=kill-session'
set -g command-alias[103] 'kw=kill-window'

# PLUGINS
#--------------------
# IMPORTANT: leave at the bottom
# To install tpm run: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# prefix + I -> installs new plugins
# prefix + U, then type all | <plugin name> -> updates plugins
# prefix + alt + u -> remove/uninstall plugins

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'

# fuzzy find on screen; <prefix><tab> to open, <c-f> for filter mode
set -g @plugin 'laktak/extrakto'
set -g @extrakto_popup_size 50%

# minimalist status bar
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-bg default
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-status-right '%I:%M %p '
set -g @tmux-dotbar-fg-session "#9399b2"
set -g @tmux-dotbar-fg-current "#cdd6f4"
set -g @tmux-dotbar-fg "#585b70"
set -g @tmux-dotbar-rounded true
set -g @tmux-dotbar-window-status-format " #[fg=$COLOR_DARK_GREY]#I #[fg=#{?window_active,#{@tmux-dotbar-fg-current},#{@tmux-dotbar-fg}}]#W #[fg=$COLOR_DARK_GREY]#(git -C #{pane_current_path} branch --show-current 2>/dev/null) "

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# NOTE: for error 128, ensure plugin is installed
run -b '~/.tmux/plugins/tpm/tpm'
